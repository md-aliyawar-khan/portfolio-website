<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Test - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Test styles to show navigation clearly */
        body {
            padding-top: 100px;
        }
        .test-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }
        #about { background: #2c3e50; }
        #experience { background: #34495e; }
        #projects { background: #2c3e50; }
        #skills { background: #34495e; }
        #blogs { background: #2c3e50; }
        #contact { background: #34495e; }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <button id="theme-toggle-btn" aria-label="Toggle dark/light theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    <div class="language-toggle">
        <button id="lang-en" aria-label="Switch to English">EN</button>
        <button id="lang-fr" aria-label="Passer en français">FR</button>
    </div>

    <!-- Navigation Bar -->
    <nav>
        <div class="container">
            <a href="#" class="logo">Mohammad Aliyawar Khan</a>
            <ul>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#experience" class="nav-link">Experience</a></li>
                <li><a href="#projects" class="nav-link">Projects</a></li>
                <li><a href="#skills" class="nav-link">Skills</a></li>
                <li><a href="#blogs" class="nav-link">Blogs</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="mobile-menu-btn" aria-label="Toggle mobile menu" role="button" tabindex="0">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Test Sections -->
    <section id="about" class="test-section">
        <h2>About Section</h2>
    </section>
    
    <section id="experience" class="test-section">
        <h2>Experience Section</h2>
    </section>
    
    <section id="projects" class="test-section">
        <h2>Projects Section</h2>
    </section>
    
    <section id="skills" class="test-section">
        <h2>Skills Section</h2>
    </section>
    
    <section id="blogs" class="test-section">
        <h2>Blogs Section</h2>
    </section>
    
    <section id="contact" class="test-section">
        <h2>Contact Section</h2>
    </section>

    <script>
        // Simple smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Mobile menu toggle
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('nav ul');
        
        if (mobileMenuBtn && nav) {
            mobileMenuBtn.addEventListener('click', () => {
                nav.classList.toggle('active');
                mobileMenuBtn.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
